{{- if .Values.substrate597a.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arkhe.fullname" . }}-597a
  labels:
    {{- include "arkhe.labels" . | nindent 4 }}
    app.kubernetes.io/component: substrate597a
spec:
  replicas: {{ .Values.substrate597a.replicaCount }}
  selector:
    matchLabels:
      {{- include "arkhe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: substrate597a
  template:
    metadata:
      labels:
        {{- include "arkhe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: substrate597a
    spec:
      containers:
        - name: openbiollm
          image: "{{ .Values.substrate597a.image.repository }}:{{ .Values.substrate597a.image.tag }}"
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.substrate597a.resources | nindent 12 }}
        - name: ollama-sidecar
          image: "{{ .Values.substrate597a.ollama.image }}"
          ports:
            - containerPort: 11434
          resources:
            {{- toYaml .Values.substrate597a.ollama.resources | nindent 12 }}
{{- end }}
