# Default values for arkhe.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: arkhe-os
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  # arkhe user setup as per Dockerfile
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  LOG_LEVEL: "info"

secrets: {}
  # DB_PASSWORD: "changeme"

# ───────────────────────────────────────────────────────────────────────────────
# Substrate ExtendDB — DynamoDB-compatible adapter
# ───────────────────────────────────────────────────────────────────────────────
extenddb:
  enabled: true
  name: extenddb
  version: "v0.1.0"

  image:
    repository: ghcr.io/arkhe-os/extenddb
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # PostgreSQL backend (obrigatório)
  storage:
    postgres:
      host: ""          # preenchido via Terraform ou values-production.yaml
      port: 5432
      user: arkhe_extenddb
      database: extenddb_catalog
      existingSecret: extenddb-postgres-credentials

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop: ["ALL"]

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
      scheme: HTTPS
    initialDelaySeconds: 15
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
      scheme: HTTPS
    initialDelaySeconds: 5
    periodSeconds: 15

  # Persistência para certificados TLS
  persistence:
    enabled: true
    size: 1Gi
    mountPath: /root/.extenddb

  ingress:
    enabled: false   # Expor via gateway principal

  # Prometheus metrics
  monitoring:
    enabled: true
    metricsPort: 8000
    metricsPath: /metrics

# ───────────────────────────────────────────────────────────────────────────────
# Substrate 597 — BioLLM (3 Tracks)
# ───────────────────────────────────────────────────────────────────────────────
substrate597a:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/openbiollm
    tag: latest
  replicaCount: 1
  ollama:
    image: ollama/ollama:latest
    resources:
      limits:
        nvidia.com/gpu: 1
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
  service:
    type: ClusterIP
    port: 8080

substrate597b:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/biollm-bgi
    tag: latest
  replicaCount: 1
  resources:
    limits:
      nvidia.com/gpu: 1
      cpu: 4000m
      memory: 16Gi
  service:
    type: ClusterIP
    port: 8080

substrate597c:
  enabled: true
  image:
    repository: ghcr.io/arkhe-os/biollm-wetware
    tag: latest
  replicaCount: 1
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 8080
