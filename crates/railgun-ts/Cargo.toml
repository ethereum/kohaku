[package]
name = "railgun-ts"
version = "0.1.0"
edition = "2024"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[lib]
crate-type = ["cdylib"]

[dependencies]
railgun-rs = { workspace = true, features = ["js"] }
alloy = { workspace = true }
eip-1193-provider = { workspace = true, features = ["js"] }
userop_kit = { workspace = true, features = ["js"] }
serde = { workspace = true }
tsify = { workspace = true, features = ["js"] }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
rand = { workspace = true }
tracing-wasm = { workspace = true }
tracing = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["wasm-bindgen-futures"]
