name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            shell: ci-js
        - name: Audit dependencies
          run: pnpm audit
          continue-on-error: true
    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            shell: ci-js
            build-packages: true
    tests:
        name: Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            shell: ci-js
            build-packages: true
        - name: Run tests
          uses: nick-fields/retry@v3
          with:
            timeout_minutes: 20
            max_attempts: 3
            command: pnpm test
          env:
            SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
            RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
        
        - name: Run Railgun integration tests
          run: cd packages/railgun && just integration
          env:
            RPC_URL_MAINNET: ${{ secrets.RPC_URL_MAINNET }}
            RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
            DEV_KEY: ${{ secrets.DEV_KEY }}
            DEV_ADDRESS: ${{ secrets.DEV_ADDRESS }}
            DEV_VIEWING_KEY: ${{ secrets.DEV_VIEWING_KEY }}
            DEV_SPENDING_KEY: ${{ secrets.DEV_SPENDING_KEY }}
