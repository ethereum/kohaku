name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:
    check-secrets:
        uses: ./.github/workflows/check-secrets.yml
        secrets: inherit

    check:
        name: Check
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
        - name: Audit dependencies
          run: pnpm audit
          continue-on-error: true
        - run: cargo test
        - run: cargo check --target wasm32-unknown-unknown 

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            build-packages: true
    tests:
        name: Tests
        needs: check-secrets
        if: needs.check-secrets.outputs.available == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            build-packages: true
        - name: Run Railgun tests
          run: cd crates/railgun-ts && pnpm test:e2e
          env:
            RPC_URL_MAINNET: ${{ secrets.RPC_URL_MAINNET }}
            RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
            DEV_KEY: ${{ secrets.DEV_KEY }}
            DEV_ADDRESS: ${{ secrets.DEV_ADDRESS }}
            DEV_VIEWING_KEY: ${{ secrets.DEV_VIEWING_KEY }}
            DEV_SPENDING_KEY: ${{ secrets.DEV_SPENDING_KEY }}
