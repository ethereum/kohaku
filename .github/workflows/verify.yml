name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:
    check-secrets:
        uses: ./.github/workflows/check-secrets.yml
        secrets: inherit

    check:
        name: Check
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
        - name: Audit dependencies
          run: pnpm audit
          continue-on-error: true

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            build-packages: true
    tests:
        name: Tests
        needs: check-secrets
        if: needs.check-secrets.outputs.available == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup workspace
          uses: ./.github/actions/setup-workspace
          with:
            build-packages: true
        - name: Run Privacy Pools tests
          uses: nick-fields/retry@v3
          with:
            timeout_minutes: 20
            max_attempts: 3
            command: pnpm --filter @kohaku-eth/privacy-pools test
          env:
            RPC_URL_MAINNET: ${{ secrets.RPC_URL_MAINNET }}
            RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
            PPV1_MAINNET_FORK_BLOCK: ${{ secrets.PPV1_MAINNET_FORK_BLOCK }}
            PPV1_SEPOLIA_FORK_BLOCK: ${{ secrets.PPV1_SEPOLIA_FORK_BLOCK }}
        
        - name: Run Railgun tests
          run: cd packages/railgun && just integration
          env:
            RPC_URL_MAINNET: ${{ secrets.RPC_URL_MAINNET }}
            RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
            DEV_KEY: ${{ secrets.DEV_KEY }}
            DEV_ADDRESS: ${{ secrets.DEV_ADDRESS }}
            DEV_VIEWING_KEY: ${{ secrets.DEV_VIEWING_KEY }}
            DEV_SPENDING_KEY: ${{ secrets.DEV_SPENDING_KEY }}
