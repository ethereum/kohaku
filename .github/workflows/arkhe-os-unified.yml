name: ARKHE OS CI/CD Unified (com ExtendDB)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/arkhe-os-unified
  HELM_CHART_DIR: helm-arkhe-os-unified
  # ExtendDB
  EXTENDDB_REPO: ExtendDB/extenddb
  EXTENDDB_VERSION: v0.1.0

jobs:
  # ═══════════════════════════════════════════════════════════════
  # NOVO: Build do ExtendDB a partir do fonte (Rust)
  # ═══════════════════════════════════════════════════════════════
  build-extenddb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    outputs:
      extenddb-digest: ${{ steps.meta.outputs.digest }}
    steps:
      - name: Checkout ExtendDB
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EXTENDDB_REPO }}
          ref: ${{ env.EXTENDDB_VERSION }}
          path: extenddb-src

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"
          target: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Install cross-compilation deps (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build ExtendDB
        working-directory: extenddb-src
        run: |
          cargo build --release \
            --target ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Run ExtendDB unit tests
        working-directory: extenddb-src
        run: cargo test --release

      - name: Upload ExtendDB binary
        uses: actions/upload-artifact@v4
        with:
          name: extenddb-${{ matrix.arch }}
          path: extenddb-src/target/${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}/release/extenddb

      # Container image do ExtendDB (para uso com Podman/Docker no ARKHE)
      - name: Log in to GHCR
        if: github.event_name == 'release' || github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ExtendDB container
        if: github.event_name == 'release' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: extenddb-src
          file: extenddb-src/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/extenddb:${{ env.EXTENDDB_VERSION }}

  # ═══════════════════════════════════════════════════════════════
  # Build & Test do ARKHE OS (atualizado com ExtendDB service)
  # ═══════════════════════════════════════════════════════════════
  build-and-test:
    runs-on: ubuntu-latest
    needs: build-extenddb   # depende do ExtendDB estar pronto
    strategy:
      matrix:
        arch: [amd64, arm64]

    services:
      # Serviço PostgreSQL para o ExtendDB
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arkhe
          POSTGRES_PASSWORD: arkhe_test
          POSTGRES_DB: extenddb_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # ExtendDB rodando como service container
      extenddb:
        image: ${{ env.REGISTRY }}/${{ github.repository }}/extenddb:${{ env.EXTENDDB_VERSION }}
        ports:
          - 8000:8000
        env:
          EXTENDDB__STORAGE__POSTGRES__HOST: postgres
          EXTENDDB__STORAGE__POSTGRES__PORT: "5432"
          EXTENDDB__STORAGE__POSTGRES__USER: arkhe
          EXTENDDB__STORAGE__POSTGRES__PASSWORD: arkhe_test
          EXTENDDB__STORAGE__POSTGRES__DBNAME: extenddb_catalog
        options: >-
          --health-cmd "curl --cacert /root/.extenddb/tls/cert.pem https://localhost:8000/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Podmanfile.unified
          platforms: linux/${{ matrix.arch }}
          load: true
          tags: arkhe:test-${{ matrix.arch }}
          cache-from: type=gha,scope=arkhe-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=arkhe-${{ matrix.arch }}

      # Inicializa ExtendDB antes dos testes
      - name: Initialize ExtendDB
        run: |
          # Espera o ExtendDB estar pronto
          for i in $(seq 1 30); do
            if curl -sk https://localhost:8000/health 2>/dev/null; then
              echo "ExtendDB pronto!"
              break
            fi
            echo "Aguardando ExtendDB... ($i)"
            sleep 2
          done
          # Cria tabela de provas ZK
          aws dynamodb create-table \
            --table-name arkhe_zk_proofs \
            --attribute-definitions AttributeName=proof_id,AttributeType=S \
            --key-schema AttributeName=proof_id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url https://localhost:8000 \
            --no-verify-ssl \
            --region us-east-1

      - name: Run container healthcheck
        run: |
          docker run --rm arkhe:test-${{ matrix.arch }} /arkhe/venv/bin/python3 /arkhe/healthcheck.py

      # ═══ NOVO: Teste de integração ARKHE ↔ ExtendDB ═══
      - name: Integration Test – ARKHE ↔ ExtendDB
        env:
          ARKHE_DYNAMODB_ENDPOINT: https://localhost:8000
          ARKHE_DYNAMODB_TABLE: arkhe_zk_proofs
        run: |
          # Simula o Substrate 585 escrevendo uma prova ZK no ExtendDB
          docker run --rm \
            --network host \
            -e ARKHE_DYNAMODB_ENDPOINT=$ARKHE_DYNAMODB_ENDPOINT \
            -e ARKHE_DYNAMODB_TABLE=$ARKHE_DYNAMODB_TABLE \
            arkhe:test-${{ matrix.arch }} \
            /arkhe/venv/bin/python3 -c "
          import boto3, json, os
          endpoint = os.environ['ARKHE_DYNAMODB_ENDPOINT']
          table = os.environ['ARKHE_DYNAMODB_TABLE']
          client = boto3.client('dynamodb', endpoint_url=endpoint,
                                region_name='us-east-1', verify=False)
          # PutItem: simula prova ZK Groth16
          client.put_item(TableName=table, Item={
              'proof_id': {'S': 'groth16-001'},
              'curve': {'S': 'bn254'},
              'substrate': {'S': '585-GROTH16'},
              'status': {'S': 'verified'}
          })
          # GetItem
          resp = client.get_item(TableName=table, Key={'proof_id': {'S': 'groth16-001'}})
          assert resp['Item']['status']['S'] == 'verified', 'Falha na integração ExtendDB!'
          print('✓ Integração ARKHE ↔ ExtendDB verificada com sucesso')
          "

      # Testes específicos dos substrates (inalterados)
      - name: Test Substrate 585 – Groth16 ZK
        run: |
          docker run --rm arkhe:test-${{ matrix.arch }} /arkhe/585/groth16-verifier-go --test

      - name: Test Substrate 586 – Synapse Brain Map
        run: |
          docker run --rm --entrypoint /arkhe/venv/bin/python3 arkhe:test-${{ matrix.arch }} -m pytest /arkhe/586/src/tests

      - name: Test Substrate 566 – Runtime Abstraction
        run: |
          docker run --rm --entrypoint /arkhe/venv/bin/python3 arkhe:test-${{ matrix.arch }} -m pytest /arkhe/566/src/tests

      - name: Test Substrate 570 – Claude Code Bridge
        run: |
          docker run --rm --entrypoint /arkhe/venv/bin/python3 arkhe:test-${{ matrix.arch }} -m pytest /arkhe/570/src/tests

      - name: Test Substrate 587 – Podman Runtime (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --privileged arkhe:test-${{ matrix.arch }} podman --version

  # ─────────────── PUBLISH IMAGE ───────────────
  publish-image:
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=v∞.Ω.∇+++
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Podmanfile.unified
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────── PACKAGE HELM CHART ───────────────
  package-helm:
    needs: publish-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package ${{ env.HELM_CHART_DIR }} --version ${{ github.ref_name }} --app-version v∞.Ω.∇+++

      - name: Upload Helm chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: arkhe-helm-chart
          path: arkhe-os-unified-*.tgz

  # ─────────────── DEPLOY TO STAGING ───────────────
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: publish-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubectl context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Deploy Helm chart to staging
        run: |
          helm upgrade --install arkhe-staging ./${{ env.HELM_CHART_DIR }} \
            --namespace arkhe-staging \
            --create-namespace \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ github.repository }} \
            --values ./${{ env.HELM_CHART_DIR }}/values-staging.yaml