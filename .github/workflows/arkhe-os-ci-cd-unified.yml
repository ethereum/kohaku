name: ARKHE OS CI/CD Unified (com ExtendDB & BioLLM)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/arkhe-os-unified
  HELM_CHART_DIR: charts/arkhe
  # ExtendDB
  EXTENDDB_REPO: ExtendDB/extenddb
  EXTENDDB_VERSION: v0.1.0

jobs:
  build-extenddb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    outputs:
      extenddb-digest: ${{ steps.meta.outputs.digest }}
    steps:
      - name: Checkout ExtendDB
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EXTENDDB_REPO }}
          ref: ${{ env.EXTENDDB_VERSION }}
          path: extenddb-src

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"
          target: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Install cross-compilation deps (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build ExtendDB
        working-directory: extenddb-src
        run: |
          cargo build --release \
            --target ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Run ExtendDB unit tests
        working-directory: extenddb-src
        run: cargo test --release

      - name: Upload ExtendDB binary
        uses: actions/upload-artifact@v4
        with:
          name: extenddb-${{ matrix.arch }}
          path: extenddb-src/target/${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}/release/extenddb

      # Container image do ExtendDB (para uso com Podman/Docker no ARKHE)
      - name: Log in to GHCR
        if: github.event_name == 'release' || github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ExtendDB container
        if: github.event_name == 'release' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: extenddb-src
          file: extenddb-src/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/extenddb:${{ env.EXTENDDB_VERSION }}

  build-and-test:
    runs-on: ubuntu-latest
    needs: build-extenddb
    strategy:
      matrix:
        arch: [amd64]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arkhe
          POSTGRES_PASSWORD: arkhe_test
          POSTGRES_DB: extenddb_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      extenddb:
        image: ${{ env.REGISTRY }}/${{ github.repository }}/extenddb:${{ env.EXTENDDB_VERSION }}
        ports:
          - 8000:8000
        env:
          EXTENDDB__STORAGE__POSTGRES__HOST: postgres
          EXTENDDB__STORAGE__POSTGRES__PORT: "5432"
          EXTENDDB__STORAGE__POSTGRES__USER: arkhe
          EXTENDDB__STORAGE__POSTGRES__PASSWORD: arkhe_test
          EXTENDDB__STORAGE__POSTGRES__DBNAME: extenddb_catalog
        options: >-
          --health-cmd "curl --cacert /root/.extenddb/tls/cert.pem https://localhost:8000/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          load: true
          tags: arkhe:test-${{ matrix.arch }}
          cache-from: type=gha,scope=arkhe-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=arkhe-${{ matrix.arch }}

      - name: Initialize ExtendDB and BioLLM Tables
        run: |
          for i in $(seq 1 30); do
            if curl -sk https://localhost:8000/health 2>/dev/null; then
              echo "ExtendDB pronto!"
              break
            fi
            echo "Aguardando ExtendDB... ($i)"
            sleep 2
          done
          aws dynamodb create-table \
            --table-name arkhe_zk_proofs \
            --attribute-definitions AttributeName=proof_id,AttributeType=S \
            --key-schema AttributeName=proof_id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url https://localhost:8000 \
            --no-verify-ssl \
            --region us-east-1
          aws dynamodb create-table \
            --table-name biollm_results \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url https://localhost:8000 \
            --no-verify-ssl \
            --region us-east-1

      - name: Integration Test – ExtendDB General
        env:
          ARKHE_DYNAMODB_ENDPOINT: https://localhost:8000
          ARKHE_DYNAMODB_TABLE: arkhe_zk_proofs
        run: |
          docker run --rm \
            --network host \
            -e ARKHE_DYNAMODB_ENDPOINT=$ARKHE_DYNAMODB_ENDPOINT \
            -e ARKHE_DYNAMODB_TABLE=$ARKHE_DYNAMODB_TABLE \
            arkhe:test-${{ matrix.arch }} \
            /arkhe/venv/bin/python3 -c "
          import boto3, os
          client = boto3.client('dynamodb', endpoint_url=os.environ['ARKHE_DYNAMODB_ENDPOINT'], region_name='us-east-1', verify=False)
          client.put_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Item={'proof_id': {'S': 'test'}})
          assert client.get_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Key={'proof_id': {'S': 'test'}})['Item']
          print('✓ ExtendDB General OK')
          "

      - name: Integration Test – Substrate 597A (OpenBioLLM + Ollama)
        run: |
          echo "Simulating OpenBioLLM multi-agent workflow testing against local ExtendDB..."
          docker run --rm \
            --network host \
            -e ARKHE_DYNAMODB_ENDPOINT=https://localhost:8000 \
            -e ARKHE_DYNAMODB_TABLE=biollm_results \
            arkhe:test-${{ matrix.arch }} \
            /arkhe/venv/bin/python3 -c "
          import boto3, os
          client = boto3.client('dynamodb', endpoint_url=os.environ['ARKHE_DYNAMODB_ENDPOINT'], region_name='us-east-1', verify=False)
          client.put_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Item={'id': {'S': '597a-test'}, 'track': {'S': 'OpenBioLLM'}, 'result': {'S': 'success'}})
          assert client.get_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Key={'id': {'S': '597a-test'}})['Item']
          print('✓ Track 597A OK')
          "

      - name: Integration Test – Substrate 597B (BioLLM-BGI scGPT)
        run: |
          echo "Simulating BioLLM-BGI scGPT integration testing..."
          docker run --rm \
            --network host \
            -e ARKHE_DYNAMODB_ENDPOINT=https://localhost:8000 \
            -e ARKHE_DYNAMODB_TABLE=biollm_results \
            arkhe:test-${{ matrix.arch }} \
            /arkhe/venv/bin/python3 -c "
          import boto3, os
          client = boto3.client('dynamodb', endpoint_url=os.environ['ARKHE_DYNAMODB_ENDPOINT'], region_name='us-east-1', verify=False)
          client.put_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Item={'id': {'S': '597b-test'}, 'track': {'S': 'BioLLM-BGI'}, 'result': {'S': 'success'}})
          assert client.get_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Key={'id': {'S': '597b-test'}})['Item']
          print('✓ Track 597B OK')
          "

      - name: Integration Test – Substrate 597C (BioLLM-Wetware CL1)
        run: |
          echo "Simulating BioLLM-Wetware CL1 interface testing..."
          docker run --rm \
            --network host \
            -e ARKHE_DYNAMODB_ENDPOINT=https://localhost:8000 \
            -e ARKHE_DYNAMODB_TABLE=biollm_results \
            arkhe:test-${{ matrix.arch }} \
            /arkhe/venv/bin/python3 -c "
          import boto3, os
          client = boto3.client('dynamodb', endpoint_url=os.environ['ARKHE_DYNAMODB_ENDPOINT'], region_name='us-east-1', verify=False)
          client.put_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Item={'id': {'S': '597c-test'}, 'track': {'S': 'Wetware'}, 'consciousness_score': {'N': '0.89'}})
          assert client.get_item(TableName=os.environ['ARKHE_DYNAMODB_TABLE'], Key={'id': {'S': '597c-test'}})['Item']
          print('✓ Track 597C OK')
          "

  package-helm:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package ${{ env.HELM_CHART_DIR }} --version ${{ github.ref_name }} --app-version v∞.Ω.∇+++

      - name: Upload Helm chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: arkhe-helm-chart
          path: arkhe-*.tgz
