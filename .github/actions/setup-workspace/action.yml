name: 'Setup Workspace'
description: 'Sets up Node.js, pnpm, caching, installs dependencies, and builds packages'

inputs:
  shell:
    description: 'Nix shell to use for this job'
    required: false
    default: 'ci'
  build-packages:
    description: 'Whether to build packages'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: nixbuild/nix-quick-install-action@v30
      with:
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-primary-key: never

    - uses: nicknovitski/nix-develop@v1
      with:
        arguments: .#${{ inputs.shell }}

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: |
        pnpm config set auto-install-peers false
        pnpm install --ignore-scripts

    - name: Build packages
      if: inputs.build-packages == 'true'
      shell: bash
      run: |
        pnpm build
