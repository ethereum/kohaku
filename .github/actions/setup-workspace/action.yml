name: 'Setup Workspace'
description: 'Sets up Node.js, pnpm, Rust, Foundry, and builds packages'

inputs:
  build-packages:
    description: 'Whether to build packages'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.88.0
        components: rust-src,llvm-tools
        targets: wasm32-unknown-unknown

    - uses: Swatinem/rust-cache@v2

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      version: v1.4.4

    # wasm-pack 0.14 still bundles Binaryen 117, which cannot parse current Rust +
    # wasm-bindgen wasm. Nix devShell puts newer binaryen on PATH; CI needs the same.
    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: v0.14.0

    - name: Install binaryen (wasm-opt for wasm-pack)
      shell: bash
      env:
        BINARYEN_TAG: version_129
      run: |
        set -euo pipefail
        case "${RUNNER_ARCH}" in
          X64|X86) target=x86_64-linux ;;
          ARM64|ARM) target=aarch64-linux ;;
          *) echo "unsupported RUNNER_ARCH=${RUNNER_ARCH}"; exit 1 ;;
        esac
        url="https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_TAG}/binaryen-${BINARYEN_TAG}-${target}.tar.gz"
        curl -fsSL "$url" | tar xz -C "${RUNNER_TEMP}"
        bin="${RUNNER_TEMP}/binaryen-${BINARYEN_TAG}/bin"
        echo "$bin" >> "${GITHUB_PATH}"
        # GITHUB_PATH only affects later steps; export for this step's wasm-opt check.
        export PATH="$bin:$PATH"
        wasm-opt --version

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: '10'

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: |
        pnpm config set auto-install-peers false
        pnpm install --ignore-scripts

    - name: Build packages
      if: inputs.build-packages == 'true'
      shell: bash
      run: |
        pnpm build
